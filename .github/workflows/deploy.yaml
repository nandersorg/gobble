name: Deploy to MicroK8s

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure namespace and storage class
        run: |
          microk8s kubectl apply -f k8s/namespace.yaml
          microk8s kubectl get storageclass microk8s-hostpath >/dev/null 2>&1 || {
            echo "MicroK8s hostpath storage class is not available";
            exit 1;
          }

      - name: Create/update Kubernetes secrets
        run: |
          microk8s kubectl create secret generic gobble-secrets \
            --from-literal=ollama_host='${{ secrets.OLLAMA_HOST }}' \
            -n gobble \
            --dry-run=client -o yaml | microk8s kubectl apply -f -

      - name: Apply PVC and Ollama manifests
        run: |
          microk8s kubectl apply -f k8s/pvc.yaml
          microk8s kubectl apply -f k8s/ollama.yaml

      - name: Wait for PVC and Ollama rollout
        run: |
          echo "Waiting for PVC to bind..."
          microk8s kubectl get pvc gobble-models-pvc -n gobble -o wide
          microk8s kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/gobble-models-pvc -n gobble --timeout=5m || {
            microk8s kubectl describe pvc gobble-models-pvc -n gobble || true
            exit 1
          }
          echo "Waiting for Ollama rollout..."
          microk8s kubectl rollout status deployment/ollama -n gobble --timeout=10m

      - name: Start Port-Forward to Ollama
        run: |
          echo "Opening port-forward to Ollama service..."
          microk8s kubectl port-forward -n gobble svc/ollama-lb 11434:11434 &
          # Wacht even 3 seconden tot de tunnel daadwerkelijk up-and-running is
          sleep 3

      - name: Pull Gemma 2 Model via Local Curl
        run: |
          echo "Triggering model download..."
          curl -X POST http://localhost:11434/api/pull -d '{"name": "gemma2:2b"}'
          echo "Model pull command completed."

      - name: Verify Loaded Models
        run: |
          curl http://localhost:11434/api/tags

      - name: Verify deployment
        run: |
          echo "Deployment status:"
          microk8s kubectl get pods -n gobble
          microk8s kubectl get svc -n gobble
